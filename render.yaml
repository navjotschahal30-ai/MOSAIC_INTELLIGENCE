databases:
  - name: mosaic-intelligence-db
    plan: basic_256mb
    region: oregon
    postgresMajorVersion: "17"

services:
  - type: web
    name: mosaic-intelligence
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mosaic-intelligence-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: VOW_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: DDF_CLIENT_ID
        sync: false
      - key: DDF_CLIENT_SECRET
        sync: false
